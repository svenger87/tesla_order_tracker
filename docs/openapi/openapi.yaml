openapi: 3.0.3
info:
  title: tff order stats API
  description: |
    External REST API for tff order stats.

    This API allows external systems to create, read, and update Tesla orders.
    All endpoints require API key authentication via the `X-API-Key` header.

    ## Authentication
    Include your API key in the `X-API-Key` header with every request:
    ```
    X-API-Key: your-api-key-here
    ```

    ## Response Format
    All responses follow a consistent envelope format:
    ```json
    {
      "success": true,
      "data": { ... },
      "meta": {
        "timestamp": "2025-02-12T10:30:00Z",
        "version": "v1"
      }
    }
    ```

    ## Date Format
    All dates use German format: `DD.MM.YYYY` (e.g., `15.01.2025`)
  version: 1.0.0
  contact:
    name: tff order stats
servers:
  - url: 'https://tff-order-stats.de/api/v1'
    description: Production
  - url: 'http://localhost:3000/api/v1'
    description: Local Development

security:
  - ApiKeyAuth: []

tags:
  - name: Orders
    description: Order management operations
  - name: TOST
    description: |
      TOST (tesla-order-status-tracker.de) integration endpoints.
      These endpoints allow TOST to create, claim, and update orders as a trusted service partner.
      All TOST endpoints require authentication via a separate `TOST_API_KEY`.
  - name: Options
    description: Form dropdown options

paths:
  /orders:
    get:
      tags:
        - Orders
      summary: List all orders
      description: Returns a paginated list of orders with optional filtering
      operationId: listOrders
      parameters:
        - name: limit
          in: query
          description: Maximum number of orders to return (1-100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          description: Number of orders to skip
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: country
          in: query
          description: Filter by country code (e.g., de, at, ch)
          schema:
            type: string
        - name: model
          in: query
          description: Filter by model (standard, premium, performance)
          schema:
            type: string
            enum: [standard, premium, performance]
        - name: archived
          in: query
          description: Include archived orders
          schema:
            type: boolean
            default: false
        - name: vehicleType
          in: query
          description: Filter by vehicle type
          schema:
            type: string
            enum: [Model Y, Model 3]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Order'
                      meta:
                        allOf:
                          - $ref: '#/components/schemas/Meta'
                          - type: object
                            properties:
                              pagination:
                                $ref: '#/components/schemas/Pagination'
              example:
                success: true
                data:
                  - id: "clx123abc"
                    name: "MaxMustermann"
                    vehicleType: "Model Y"
                    orderDate: "15.01.2025"
                    country: "de"
                    model: "performance"
                    range: null
                    drive: "awd"
                    color: "ultra_red"
                    interior: "black"
                    wheels: "21"
                    towHitch: "ja"
                    autopilot: "fsd"
                    seats: "5"
                    source: null
                    tostUserId: null
                    deliveryWindow: "Februar 2025"
                    deliveryLocation: "München"
                    vin: null
                    vinReceivedDate: null
                    papersReceivedDate: null
                    productionDate: null
                    typeApproval: null
                    typeVariant: null
                    deliveryDate: null
                    orderToProduction: null
                    orderToVin: null
                    orderToDelivery: null
                    orderToPapers: null
                    papersToDelivery: null
                    archived: false
                    archivedAt: null
                    createdAt: "2025-02-12T10:30:00.000Z"
                    updatedAt: "2025-02-12T10:30:00.000Z"
                meta:
                  timestamp: "2025-02-12T10:30:00.000Z"
                  version: "v1"
                  pagination:
                    total: 150
                    limit: 50
                    offset: 0
                    hasMore: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

    post:
      tags:
        - Orders
      summary: Create a new order
      description: Creates a new order with the provided details
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
            example:
              name: "MaxMustermann"
              vehicleType: "Model Y"
              orderDate: "15.01.2025"
              country: "de"
              model: "performance"
              drive: "awd"
              color: "ultra_red"
              interior: "black"
              wheels: "21"
              towHitch: "ja"
              autopilot: "fsd"
              seats: "5"
              deliveryWindow: "Februar 2025"
              deliveryLocation: "München"
              editCode: "MySecure123"
      responses:
        '201':
          description: Order created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CreateOrderResponse'
              example:
                success: true
                data:
                  id: "clx789ghi"
                  editCode: "MySecure123"
                  message: "Order created successfully"
                meta:
                  timestamp: "2025-02-12T10:30:00.000Z"
                  version: "v1"
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/ServerError'

  /orders/{id}:
    get:
      tags:
        - Orders
      summary: Get order by ID
      description: Returns a single order by its ID
      operationId: getOrderById
      parameters:
        - name: id
          in: path
          required: true
          description: Order ID
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Order'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

    put:
      tags:
        - Orders
      summary: Update an order
      description: Updates an existing order. Requires the order's edit code for authorization.
      operationId: updateOrder
      parameters:
        - name: id
          in: path
          required: true
          description: Order ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrderRequest'
            example:
              editCode: "MySecure123"
              vin: "5YJ3E1EA1NF123456"
              vinReceivedDate: "10.02.2025"
              deliveryWindow: "Februar 2025"
      responses:
        '200':
          description: Order updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UpdateOrderResponse'
              example:
                success: true
                data:
                  id: "clx123abc"
                  updatedAt: "2025-02-12T10:35:00.000Z"
                  message: "Order updated successfully"
                meta:
                  timestamp: "2025-02-12T10:35:00.000Z"
                  version: "v1"
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/ServerError'

  /orders/by-name/{name}:
    get:
      tags:
        - Orders
      summary: Get orders by username
      description: |
        Returns all orders for a given username. Returns an array since
        a user can have multiple orders with different order dates.
        Username matching is case-insensitive.
      operationId: getOrdersByName
      parameters:
        - name: name
          in: path
          required: true
          description: Username (URL-encoded)
          schema:
            type: string
        - name: archived
          in: query
          description: Include archived orders
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Order'
                      meta:
                        allOf:
                          - $ref: '#/components/schemas/Meta'
                          - type: object
                            properties:
                              count:
                                type: integer
                                description: Number of orders found
              example:
                success: true
                data:
                  - id: "clx123abc"
                    name: "MaxMustermann"
                    orderDate: "15.01.2025"
                    country: "de"
                    model: "performance"
                  - id: "clx456def"
                    name: "MaxMustermann"
                    orderDate: "20.06.2024"
                    country: "de"
                    model: "premium"
                meta:
                  timestamp: "2025-02-12T10:30:00.000Z"
                  version: "v1"
                  count: 2
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /tost/orders:
    get:
      tags:
        - TOST
      summary: Find orders by username
      description: |
        Returns all non-archived orders matching the given username.
        TOST uses this to find existing orders before claiming or creating new ones.
      operationId: tostFindOrders
      security:
        - TostApiKeyAuth: []
      parameters:
        - name: name
          in: query
          required: true
          description: Username to search for (exact match)
          schema:
            type: string
      responses:
        '200':
          description: Orders found (may be empty array)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Order'
                      meta:
                        allOf:
                          - $ref: '#/components/schemas/Meta'
                          - type: object
                            properties:
                              count:
                                type: integer
                                description: Number of orders found
              example:
                success: true
                data:
                  - id: "clx123abc"
                    name: "MaxMustermann"
                    vehicleType: "Model Y"
                    orderDate: "15.01.2025"
                    source: null
                    tostUserId: null
                meta:
                  timestamp: "2026-03-13T10:30:00.000Z"
                  version: "v1"
                  count: 1
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

    post:
      tags:
        - TOST
      summary: Create a TOST-managed order
      description: |
        Creates a new order with `source` automatically set to `"tost"`.
        No editCode is required. The order will be exclusively managed by TOST.
      operationId: tostCreateOrder
      security:
        - TostApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TostCreateOrderRequest'
            example:
              name: "MaxMustermann"
              vehicleType: "Model Y"
              orderDate: "15.01.2025"
              country: "de"
              model: "performance"
              drive: "awd"
              color: "ultra_red"
              interior: "black"
              wheels: "21"
              towHitch: "ja"
              autopilot: "fsd"
              seats: "5"
              tostUserId: "tost_user_abc123"
      responses:
        '201':
          description: Order created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          id:
                            type: string
                            description: Created order ID
                          message:
                            type: string
              example:
                success: true
                data:
                  id: "clx789ghi"
                  message: "Order created successfully"
                meta:
                  timestamp: "2026-03-13T10:30:00.000Z"
                  version: "v1"
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/ServerError'

  /tost/orders/{id}:
    put:
      tags:
        - TOST
      summary: Update a TOST-owned order
      description: |
        Updates an order that is owned by TOST (`source = "tost"`).
        Returns 403 if the order is not TOST-managed — claim it first via `POST /tost/claim/{id}`.
        No editCode is required. Supports optimistic locking via `expectedUpdatedAt`.
      operationId: tostUpdateOrder
      security:
        - TostApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Order ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TostUpdateOrderRequest'
            example:
              vin: "5YJ3E1EA1NF123456"
              vinReceivedDate: "10.02.2025"
              deliveryWindow: "März 2025"
      responses:
        '200':
          description: Order updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UpdateOrderResponse'
              example:
                success: true
                data:
                  id: "clx123abc"
                  updatedAt: "2026-03-13T10:35:00.000Z"
                  message: "Order updated successfully"
                meta:
                  timestamp: "2026-03-13T10:35:00.000Z"
                  version: "v1"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/ServerError'

  /tost/claim/{id}:
    post:
      tags:
        - TOST
      summary: Claim an existing order for TOST
      description: |
        Claims an existing order so it becomes TOST-managed.
        Sets `source` to `"tost"` and optionally associates a `tostUserId`.
        Returns 409 if the order is already claimed by TOST.
        After claiming, the order can no longer be edited via the webapp.
      operationId: tostClaimOrder
      security:
        - TostApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Order ID to claim
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                tostUserId:
                  type: string
                  description: TOST's internal user identifier (optional)
            example:
              tostUserId: "tost_user_abc123"
      responses:
        '200':
          description: Order claimed successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          id:
                            type: string
                          name:
                            type: string
                          updatedAt:
                            type: string
                            format: date-time
                          message:
                            type: string
              example:
                success: true
                data:
                  id: "clx123abc"
                  name: "MaxMustermann"
                  updatedAt: "2026-03-13T10:30:00.000Z"
                  message: "Order claimed successfully"
                meta:
                  timestamp: "2026-03-13T10:30:00.000Z"
                  version: "v1"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/ServerError'

  /options:
    get:
      tags:
        - Options
      summary: Get dropdown options
      description: Returns all available dropdown options for the order form, grouped by type
      operationId: getOptions
      parameters:
        - name: type
          in: query
          description: Filter by option type
          schema:
            type: string
            enum:
              - country
              - model
              - range
              - drive
              - color
              - interior
              - wheels
              - autopilot
              - towHitch
              - seats
              - deliveryLocation
        - name: vehicleType
          in: query
          description: Filter options by vehicle type (returns vehicle-specific and universal options)
          schema:
            type: string
            enum: [Model Y, Model 3]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Options'
              example:
                success: true
                data:
                  country:
                    - value: "de"
                      label: "Deutschland"
                      vehicleType: null
                      metadata:
                        flag: "de"
                    - value: "at"
                      label: "Österreich"
                      vehicleType: null
                      metadata:
                        flag: "at"
                  model:
                    - value: "standard"
                      label: "Standard"
                      vehicleType: "Model Y"
                    - value: "premium"
                      label: "Premium"
                      vehicleType: "Model Y"
                    - value: "performance"
                      label: "Performance"
                      vehicleType: "Model Y"
                    - value: "model_3"
                      label: "Model 3"
                      vehicleType: "Model 3"
                    - value: "model_3_lr"
                      label: "Model 3 Long Range"
                      vehicleType: "Model 3"
                    - value: "model_3_performance"
                      label: "Model 3 Performance"
                      vehicleType: "Model 3"
                  color:
                    - value: "pearl_white"
                      label: "Pearl White"
                      metadata:
                        hex: "#FFFFFF"
                        border: true
                    - value: "ultra_red"
                      label: "Ultra Red"
                      metadata:
                        hex: "#C41E3A"
                        border: false
                meta:
                  timestamp: "2025-02-12T10:30:00.000Z"
                  version: "v1"
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for general API authentication
    TostApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Dedicated API key for TOST integration (separate from general API key)

  schemas:
    Order:
      type: object
      properties:
        id:
          type: string
          description: Unique order identifier
        name:
          type: string
          description: Customer username
        vehicleType:
          type: string
          nullable: true
          enum: [Model Y, Model 3]
          description: Vehicle type (Model Y or Model 3)
        orderDate:
          type: string
          nullable: true
          description: Order date (DD.MM.YYYY format)
        country:
          type: string
          nullable: true
          description: Country code
        model:
          type: string
          nullable: true
          description: |
            Tesla model trim. Values depend on vehicleType:
            - Model Y: standard, premium, performance
            - Model 3: model_3, model_3_lr, model_3_performance
        range:
          type: string
          nullable: true
          enum: [maximale_reichweite, standard]
          description: Range option (not applicable for Performance)
        drive:
          type: string
          nullable: true
          enum: [rwd, awd]
          description: Drive type
        color:
          type: string
          nullable: true
          description: Exterior color
        interior:
          type: string
          nullable: true
          enum: [black, white]
          description: Interior color
        wheels:
          type: string
          nullable: true
          enum: ['18', '19', '20', '21']
          description: Wheel size
        towHitch:
          type: string
          nullable: true
          enum: [ja, nein, nv]
          description: Tow hitch option
        autopilot:
          type: string
          nullable: true
          enum: [none, ap, eap, eap_transfer, fsd, fsd_transfer]
          description: Autopilot package
        seats:
          type: string
          nullable: true
          enum: ['5', '7']
          description: Seat configuration (5 or 7 seater, 7 only for Model Y Premium AWD)
        source:
          type: string
          nullable: true
          enum: [tost]
          description: Order source — "tost" for TOST-managed orders, null for manually created orders
        tostUserId:
          type: string
          nullable: true
          description: TOST's internal user identifier (only set for TOST-managed orders)
        deliveryWindow:
          type: string
          nullable: true
          description: Expected delivery window
        deliveryLocation:
          type: string
          nullable: true
          description: Delivery location
        vin:
          type: string
          nullable: true
          description: Vehicle Identification Number
        vinReceivedDate:
          type: string
          nullable: true
          description: Date VIN was received (DD.MM.YYYY)
        papersReceivedDate:
          type: string
          nullable: true
          description: Date papers were received (DD.MM.YYYY)
        productionDate:
          type: string
          nullable: true
          description: Production date (DD.MM.YYYY)
        typeApproval:
          type: string
          nullable: true
          description: Type approval code
        typeVariant:
          type: string
          nullable: true
          description: Type variant code
        deliveryDate:
          type: string
          nullable: true
          description: Actual delivery date (DD.MM.YYYY)
        orderToProduction:
          type: integer
          nullable: true
          description: Days from order to production
        orderToVin:
          type: integer
          nullable: true
          description: Days from order to VIN received
        orderToDelivery:
          type: integer
          nullable: true
          description: Days from order to delivery
        orderToPapers:
          type: integer
          nullable: true
          description: Days from order to papers received
        papersToDelivery:
          type: integer
          nullable: true
          description: Days from papers to delivery
        archived:
          type: boolean
          description: Whether the order is archived
        archivedAt:
          type: string
          format: date-time
          nullable: true
          description: Archive timestamp
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp

    CreateOrderRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Customer username (required)
        vehicleType:
          type: string
          enum: [Model Y, Model 3]
          description: Vehicle type (defaults to Model Y)
        orderDate:
          type: string
          description: Order date (DD.MM.YYYY format)
        country:
          type: string
        model:
          type: string
          description: |
            Model trim. Values depend on vehicleType:
            - Model Y: standard, premium, performance
            - Model 3: model_3, model_3_lr, model_3_performance
        range:
          type: string
          enum: [maximale_reichweite, standard]
        drive:
          type: string
          enum: [rwd, awd]
        color:
          type: string
        interior:
          type: string
          enum: [black, white]
        wheels:
          type: string
          enum: ['18', '19', '20', '21']
        towHitch:
          type: string
          enum: [ja, nein, nv]
        autopilot:
          type: string
          enum: [none, ap, eap, eap_transfer, fsd, fsd_transfer]
        seats:
          type: string
          enum: ['5', '7']
          description: Seat configuration (5 or 7 seater)
        deliveryWindow:
          type: string
        deliveryLocation:
          type: string
        vin:
          type: string
        vinReceivedDate:
          type: string
        papersReceivedDate:
          type: string
        productionDate:
          type: string
        typeApproval:
          type: string
        typeVariant:
          type: string
        deliveryDate:
          type: string
        editCode:
          type: string
          description: Custom edit password (min 6 chars, must contain a number)

