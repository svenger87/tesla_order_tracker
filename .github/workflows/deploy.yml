name: Build & Deploy

on:
  push:
    branches: [master, staging]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/tesla-order-tracker

            # Determine which service to deploy
            if [ "${{ github.ref_name }}" = "master" ]; then
              SERVICE=app
              PORT=3000
            else
              SERVICE=app-staging
              PORT=3001
            fi

            echo ">>> Deploying $SERVICE from branch ${{ github.ref_name }}"

            # Update docker-compose.yml from the pushed branch
            git fetch origin ${{ github.ref_name }}
            git checkout origin/${{ github.ref_name }} -- docker-compose.yml

            # Log in and pull the new image (NEVER build on VPS)
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker compose pull $SERVICE

            # Save current image ID for rollback
            OLD_IMAGE=$(docker inspect tesla-order-tracker-${SERVICE}-1 --format '{{.Image}}' 2>/dev/null || echo "")

            # Restart only the target service
            docker compose up -d --no-deps $SERVICE

            # Wait for health check
            echo ">>> Waiting for health check on port $PORT..."
            for i in $(seq 1 30); do
              if wget -qO- http://localhost:$PORT/api/health 2>/dev/null | grep -q '"ok"'; then
                echo ">>> Health check passed!"
                docker logout ghcr.io 2>/dev/null || true
                exit 0
              fi
              sleep 2
            done

            # Rollback on failure
            echo ">>> Health check FAILED — rolling back"
            if [ -n "$OLD_IMAGE" ]; then
              docker tag "$OLD_IMAGE" ghcr.io/svenger87/tesla_order_tracker:${{ github.ref_name }}
              docker compose up -d --no-deps $SERVICE
            fi
            docker logout ghcr.io 2>/dev/null || true
            exit 1
