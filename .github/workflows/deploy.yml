name: Build & Deploy

on:
  push:
    branches: [master, staging]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 cross-compile)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/tesla-order-tracker
            git fetch origin ${{ github.ref_name }}
            git checkout ${{ github.ref_name }} -- docker-compose.yml

            # Determine which service to deploy
            if [ "${{ github.ref_name }}" = "master" ]; then
              SERVICE=app
              PORT=3000
            else
              SERVICE=app-staging
              PORT=3001
            fi

            # Pull the new image (NO building on VPS!)
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker compose pull $SERVICE

            # Tag current image for rollback
            CURRENT_IMAGE=$(docker compose images $SERVICE -q 2>/dev/null | head -1)
            if [ -n "$CURRENT_IMAGE" ]; then
              docker tag "$CURRENT_IMAGE" tesla-order-tracker-${SERVICE}:rollback 2>/dev/null || true
            fi

            # Restart only the target service
            docker compose up -d --no-deps $SERVICE

            # Wait for health check
            echo "Waiting for health check on port $PORT..."
            for i in $(seq 1 30); do
              if wget -qO- http://localhost:$PORT/api/health 2>/dev/null | grep -q '"ok"'; then
                echo "Health check passed!"
                exit 0
              fi
              sleep 2
            done

            # Rollback on failure
            echo "Health check FAILED — rolling back"
            docker compose up -d --no-deps $SERVICE
            exit 1
